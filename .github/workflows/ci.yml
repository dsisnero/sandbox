name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    env:
      CRYSTAL_CACHE_DIR: ${{ github.workspace }}/.crystal-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1

      - name: Install dependencies
        run: shards install

      - name: Check formatting
        run: crystal tool format --check src spec

      - name: Lint
        run: bin/ameba src spec

      - name: Run specs
        run: crystal spec

      - name: Verify split parity manifests
        if: matrix.os == 'ubuntu-latest'
        run: make parity-verify
